<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Sollytch</title>
  <style>
    :root {
      --primary: #1e7a35;
      --primary-dark: #145427;
      --bg: #f4fbf6;
      --card: #ffffff;
    }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .form-container {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      width: 90%;
      max-width: 400px;
      text-align: center;
    }
    .form-container h1 {
      margin-bottom: 20px;
      font-size: 24px;
      color: var(--primary-dark);
    }
    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    .form-group input {
      width: 94%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }
    .button-group {
      display: flex;
      justify-content: center;
    }
    .button-group button {
      padding: 10px 20px;
      border: none;
      background-color: var(--primary);
      color: white;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    .button-group button:hover { background-color: var(--primary-dark); }
    .links {
      margin-top: 15px;
      font-size: 0.9rem;
    }
    .links a {
      color: var(--primary);
      text-decoration: none;
    }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="form-container">
  <h1>Registrar Usuario</h1>

  <div class="form-group">
    <label for="username">Nome de Usuario</label>
    <input type="text" id="username" placeholder="Digite seu username" required>
  </div>

  <div class="form-group">
    <label for="privateKey">Chave Privada EC (.pem)</label>
    <input type="file" id="privateKey" accept=".pem" required>
  </div>

  <div class="button-group">
    <button id="registerBtn">Registrar</button>
  </div>

  <div class="links">
    <p>Ja possui registro? <a href="/login">Faca login</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsrsasign@10.5.25/lib/jsrsasign-all-min.js"></script>
<script>
  function readFileAsText(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = e => resolve(e.target.result);
      reader.onerror = reject;
      reader.readAsText(file);
    });
  }

  document.getElementById('registerBtn').addEventListener('click', async () => {
    const username       = document.getElementById('username').value.trim();
    const privateKeyFile = document.getElementById('privateKey').files[0];

    if (!username || !privateKeyFile) {
      alert('Preencha todos os campos!');
      return;
    }

    try {
      // 1. Ler a chave privada do arquivo
      const pemContents = await readFileAsText(privateKeyFile);

      // 2. Validar formato PEM
      if (!pemContents.includes('-----BEGIN PRIVATE KEY-----') &&
          !pemContents.includes('-----BEGIN EC PRIVATE KEY-----')) {
        throw new Error('Formato invalido. Use chave EC no formato PEM.');
      }

      // 3. Carregar o objeto de chave via jsrsasign
      const keyObj = KEYUTIL.getKey(pemContents);
      if (keyObj.type !== 'EC' || keyObj.curveName !== 'secp256r1') {
        throw new Error('A chave deve ser EC prime256v1 (secp256r1)');
      }

      // 4. Gerar o CSR automaticamente
      const csr = new KJUR.asn1.csr.CertificationRequest({
        subject:  { str: '/CN=' + username + '/O=org1MSP/OU=client' },
        sbjpubkey: keyObj,
        sigalg:   'SHA256withECDSA',
        sbjprvkey: keyObj
      });
      const csrPem = csr.getPEM();

      // 5. Enviar username e CSR (texto PEM) para o backend
      const response = await fetch('/auth/register', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, csr: csrPem })
      });

      const data = await response.json();

      if (response.ok) {
        alert('Usuario registrado com sucesso!');
        window.location.href = '/login';
      } else {
        alert(data.error || 'Falha ao registrar usuario.');
      }

    } catch (error) {
      console.error('Erro no registro:', error);
      alert('Falha: ' + error.message);
    }
  });
</script>
</body>
</html>
