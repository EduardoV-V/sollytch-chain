<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sollytch</title>
  <style>
    :root {
      --primary: #1e7a35;
      --primary-dark: #145427;
      --bg: #f4fbf6;
      --card: #ffffff;
    }
    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .form-container {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .form-container h1 {
      margin-bottom: 20px;
      font-size: 24px;
      color: var(--primary-dark);
    }
    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    .form-group input {
      width: 94%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }
    .button-group {
      display: flex;
      justify-content: center;
    }
    .button-group button {
      padding: 10px 20px;
      border: none;
      background-color: var(--primary);
      color: white;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    .button-group button:hover { background-color: var(--primary-dark); }
    .links {
      margin-top: 15px;
      font-size: 0.9rem;
    }
    .links a {
      color: var(--primary);
      text-decoration: none;
    }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="form-container">
    <h1>Login de Usuario</h1>

    <div class="form-group">
      <label for="username">Nome de Usuario</label>
      <input type="text" id="username" placeholder="Digite seu nome de usuario" required>
    </div>

    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="Digite sua senha" required>
    </div>

    <div class="button-group">
      <button id="loginBtn">Login</button>
    </div>

    <div class="links">
      <p>Nao possui registro? <a href="/register">Registre-se</a></p>
    </div>
  </div>

  <script>
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        alert('Preencha todos os campos');
        return;
      }

      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok && data.token) {
          localStorage.setItem('token', data.token);
          alert('Login bem-sucedido!');
          window.location.href = '/';
        } else {
          alert(data.error || 'Falha no login');
        }

      } catch (error) {
        console.error('Erro no login:', error);
        alert('Erro: ' + error.message);
      }
    });
  </script>
</body>
</html>
